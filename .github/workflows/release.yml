name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Python smoke check
        run: python3 -m py_compile main.py

      - name: Package plugin
        run: ./scripts/package.sh

      - name: Upload zip to release
        run: |
          for i in 1 2 3 4 5; do
            echo "Attempt $i/5 to create release..."
            if gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --generate-notes \
              out/*.zip; then
              echo "Release created successfully!"
              exit 0
            fi
            echo "Attempt $i failed, waiting $((i * 30))s before retry..."
            sleep $((i * 30))
          done
          echo "All attempts failed!"
          exit 1
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload artifact (fallback)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: deckysense-${{ github.ref_name }}.zip
          path: out/*.zip
